<div class="register-container">
    @if(successMessage){
        <div class="success-banner">
            {{ successMessage }}
        </div>
    }
    <h2>Создать аккаунт</h2>
    <p class="subtitle">Присоединяйтесь к Flight Booking</p>
    <form (submit)="onRegister()">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" [(ngModel)]="regData.username" name="username" placeholder="Придумайте логин" required>
        </div>
        <div class="form-group">
            <label>Электронная почта</label>
            <input type="email" [(ngModel)]="regData.email" name="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" [(ngModel)]="regData.password" name="password" placeholder="Минимум 6 символов" required>
        </div>
        <div class="form-group">
            <label>Подтвердите пароль</label>
            <input type="password" [(ngModel)]="regData.confirmPassword" name="confirmPassword" placeholder="Повторите пароль" required>
        </div>
        <button type="submit" class="kaspi-button">Зарегистрироваться</button>
        <p class="footer-text">Уже есть аккаунт? <a [routerLink]="['/login']">Войти</a></p>
    </form>
</div>
